services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
      interval: 10s
      timeout: 5s
      start_period: 120s
      retries: 5

  ui:
    build: ./ui
    ports:
      - "7860:7860"
    environment:
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  huggingface-cache:
